<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>饰品手作 - 浏览挑选</title>
    <style>
        :root {
            --bg: #faf8f5;
            --card-bg: #ffffff;
            --text: #3d322b;
            --text-light: #8c7b6e;
            --accent: #c79a6e;
            --accent-light: #f0e4d4;
            --border: #e8e0d8;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250, 248, 245, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header .back-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--card-bg);
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            visibility: hidden;
        }
        .header .back-btn.visible {
            visibility: visible;
        }
        .header .title {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .header .placeholder {
            width: 36px;
        }

        /* Main Container */
        .main {
            padding: 16px;
            padding-bottom: 40px;
        }

        /* Category Grid */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .category-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px 16px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .category-card:active {
            transform: scale(0.97);
        }
        .category-card .icon {
            font-size: 36px;
            margin-bottom: 10px;
            display: block;
        }
        .category-card .cat-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }
        .category-card .cat-count {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* Product List */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text);
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .product-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        .product-card:active {
            transform: scale(0.97);
        }
        .product-card .thumb {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            background: var(--accent-light);
        }
        .product-card .info {
            padding: 10px 12px;
        }
        .product-card .p-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .product-card .p-material {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 2px;
        }

        /* Detail Page */
        .detail-page {
            display: none;
        }
        .detail-page.active {
            display: block;
        }

        /* Image Carousel */
        .carousel {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f0ece6;
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 16px;
        }
        .carousel .slides {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.35s ease;
        }
        .carousel .slide {
            min-width: 100%;
            height: 100%;
        }
        .carousel .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .carousel .dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .carousel .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .carousel .dot.active {
            background: #fff;
            width: 20px;
            border-radius: 4px;
        }
        .carousel .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .carousel:hover .nav-btn,
        .carousel:active .nav-btn {
            opacity: 1;
        }
        .carousel .prev {
            left: 10px;
        }
        .carousel .next {
            right: 10px;
        }

        /* Detail Info */
        .detail-info {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .detail-info h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
            text-align: center;
        }
        .detail-info .field {
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .detail-info .field:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .detail-info .field-label {
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .detail-info .field-value {
            font-size: 15px;
            color: var(--text);
            line-height: 1.7;
            white-space: pre-wrap;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.78);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>

                <div class="product-grid">
                    ${items.map(p => `
                        <div class="product-card" onclick="renderDetail(${p.id})">
                            <img class="thumb" src="${p.images[0]}" alt="${p.name}" loading="lazy"
                                 onerror="this.src='https://placehold.co/400x400/f0ece6/8c7b6e?text=暂无图片'">
                            <div class="info">
                                <div class="p-name">${p.name}</div>
                                <div class="p-material">${p.material.split('、')[0]}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById("mainContent").innerHTML = html;
            window.scrollTo(0, 0);
        }

        function renderDetail(productId) {
            const p = products.find(x => x.id === productId);
            if (!p) return;

            document.getElementById("headerTitle").textContent = "作品详情";
            document.getElementById("backBtn").classList.add("visible");
            // 如果当前在首页或分类页，推入返回栈
            if (pageStack.length === 0 || pageStack[pageStack.length - 1] !== p.category) {
                pageStack.push(p.category);
            }

            const html = `
                <div class="detail-page active">
                    <div class="carousel" id="carousel-${p.id}">
                        <div class="slides" id="slides-${p.id}">
                            ${p.images.map((img, i) => `
                                <div class="slide">
                                    <img src="${img}" alt="${p.name} - ${i+1}"
                                         onerror="this.src='https://placehold.co/600x600/f0ece6/8c7b6e?text=暂无图片'">
                                </div>
                            `).join('')}
                        </div>
                        ${p.images.length > 1 ? `
                        <button class="nav-btn prev" onclick="prevSlide(${p.id})">‹</button>
                        <button class="nav-btn next" onclick="nextSlide(${p.id})">›</button>
                        <div class="dots" id="dots-${p.id}">
                            ${p.images.map((_, i) => `
                                <button class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${p.id}, ${i})"></button>
                            `).join('')}
                        </div>
                        ` : ''}
                    </div>
                    <div class="detail-info">
                        <h2>${p.name}</h2>
                        <div class="field">
                            <div class="field-label">尺寸</div>
                            <div class="field-value">${p.size}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">材料</div>
                            <div class="field-value">${p.material}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">佩戴须知</div>
                            <div class="field-value">${p.wearing}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">保养须知</div>
                            <div class="field-value">${p.care}</div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById("mainContent").innerHTML = html;
            window.scrollTo(0, 0);

            // 初始化轮播状态
            window['currentSlide' + p.id] = 0;
        }

        // ===================== 轮播控制 =====================

        function goToSlide(productId, index) {
            const slides = document.getElementById('slides-' + productId);
            if (!slides) return;
            slides.style.transform = `translateX(-${index * 100}%)`;
            window['currentSlide' + productId] = index;

            // 更新 dots
            const dots = document.querySelectorAll('#dots-' + productId + ' .dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === index));
        }

        function nextSlide(productId) {
            const total = document.querySelectorAll('#slides-' + productId + ' .slide').length;
            const current = window['currentSlide' + productId] || 0;
            goToSlide(productId, (current + 1) % total);
        }

        function prevSlide(productId) {
            const total = document.querySelectorAll('#slides-' + productId + ' .slide').length;
            const current = window['currentSlide' + productId] || 0;
            goToSlide(productId, (current - 1 + total) % total);
        }

        // 触摸滑动支持
        document.addEventListener('DOMContentLoaded', () => {
            document.addEventListener('touchstart', handleTouchStart, { passive: false });
            document.addEventListener('touchmove', handleTouchMove, { passive: false });
            document.addEventListener('touchend', handleTouchEnd);
        });

        let touchStartX = 0;
        let touchCurrentX = 0;
        let touchCarouselId = null;

        function handleTouchStart(e) {
            const carousel = e.target.closest('.carousel');
            if (!carousel) return;
            touchCarouselId = parseInt(carousel.id.replace('carousel-', ''));
            touchStartX = e.touches[0].clientX;
            touchCurrentX = touchStartX;
        }

        function handleTouchMove(e) {
            if (!touchCarouselId) return;
            touchCurrentX = e.touches[0].clientX;
        }

        function handleTouchEnd() {
            if (!touchCarouselId) return;
            const diff = touchStartX - touchCurrentX;
            const threshold = 50;
            if (Math.abs(diff) > threshold) {
                if (diff > 0) nextSlide(touchCarouselId);
                else prevSlide(touchCarouselId);
            }
            touchCarouselId = null;
        }

        // ===================== 导航 =====================

        function goBack() {
            if (pageStack.length === 0) return;
            const prev = pageStack.pop();
            if (prev === "home") {
                renderHome();
            } else {
                renderCategory(prev);
            }
        }

        // ===================== Toast =====================

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ===================== 初始化 =====================
        renderHome();
    </script>
</body>
</html>
